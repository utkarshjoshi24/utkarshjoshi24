<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 160" width="840" height="160" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0D1B" />
      <stop offset="100%" stop-color="#04060E" />
    </linearGradient>
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2E93" />
      <stop offset="100%" stop-color="#00F2FE" />
    </linearGradient>
    
    <!-- Text Gradients -->
    <linearGradient id="text-cyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="text-pink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF2E93" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF2E93" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#FF2E93" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Card Background -->
  <rect width="840" height="160" fill="url(#bg)" rx="12" />

  <!-- Outer Border -->
  <rect x="0.5" y="0.5" width="839" height="159" rx="11.5" stroke="url(#border-glow)" stroke-width="1.2" />

  <!-- Dividers -->
  <line x1="210" y1="20" x2="210" y2="140" stroke="#1E293B" stroke-width="1.5" stroke-opacity="0.6" />
  <line x1="420" y1="20" x2="420" y2="140" stroke="#1E293B" stroke-width="1.5" stroke-opacity="0.6" />
  <line x1="630" y1="20" x2="630" y2="140" stroke="#1E293B" stroke-width="1.5" stroke-opacity="0.6" />

  <!-- Column 1: Public Repos -->
  <g transform="translate(0, 0)">
    <circle cx="105" cy="70" r="40" fill="url(#glow-cyan)" />
    <g transform="translate(93, 20)">
      <path d="M 12 2 L 2 7 L 12 12 L 22 7 Z" stroke="#00F2FE" stroke-width="2" fill="none" stroke-linejoin="round" />
      <path d="M 2 17 L 12 22 L 22 17" stroke="#00F2FE" stroke-width="2" fill="none" stroke-linecap="round" />
      <path d="M 2 12 L 12 17 L 22 12" stroke="#00F2FE" stroke-width="2" fill="none" stroke-linecap="round" />
    </g>
    <text x="105" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="900" fill="url(#text-cyan)" text-anchor="middle">24</text>
    <text x="105" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#00F2FE" letter-spacing="1.2" text-anchor="middle">PUBLIC REPOS</text>
    <text x="105" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">Active GitHub repositories</text>
  </g>

  <!-- Column 2: Stack -->
  <g transform="translate(210, 0)">
    <circle cx="105" cy="70" r="40" fill="url(#glow-pink)" />
    <g transform="translate(93, 20)">
      <circle cx="12" cy="12" r="4" stroke="#FF2E93" stroke-width="2" fill="none" />
      <line x1="6" y1="12" x2="2" y2="12" stroke="#FF2E93" stroke-width="2" stroke-linecap="round" />
      <line x1="22" y1="12" x2="18" y2="12" stroke="#FF2E93" stroke-width="2" stroke-linecap="round" />
      <line x1="12" y1="6" x2="12" y2="2" stroke="#FF2E93" stroke-width="2" stroke-linecap="round" />
      <line x1="12" y1="22" x2="12" y2="18" stroke="#FF2E93" stroke-width="2" stroke-linecap="round" />
    </g>
    <text x="105" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="900" fill="url(#text-pink)" text-anchor="middle">JS / TS</text>
    <text x="105" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#FF2E93" letter-spacing="1.2" text-anchor="middle">PRIMARY STACK</text>
    <text x="105" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">Robust web development</text>
  </g>

  <!-- Column 3: Focus -->
  <g transform="translate(420, 0)">
    <circle cx="105" cy="70" r="40" fill="url(#glow-cyan)" />
    <g transform="translate(93, 20)">
      <circle cx="12" cy="12" r="9" stroke="#00F2FE" stroke-width="2" fill="none" />
      <path d="M 3.6 9 L 20.4 9" stroke="#00F2FE" stroke-width="2" />
      <path d="M 3.6 15 L 20.4 15" stroke="#00F2FE" stroke-width="2" />
      <path d="M 12 3 A 9 9 0 0 0 12 21" stroke="#00F2FE" stroke-width="2" fill="none" />
    </g>
    <text x="105" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="900" fill="url(#text-cyan)" text-anchor="middle">MERN</text>
    <text x="105" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#00F2FE" letter-spacing="1.2" text-anchor="middle">FULLSTACK &amp; UI</text>
    <text x="105" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">React, Node &amp; Mongo DB</text>
  </g>

  <!-- Column 4: Data & ML -->
  <g transform="translate(630, 0)">
    <circle cx="105" cy="70" r="40" fill="url(#glow-pink)" />
    <g transform="translate(93, 20)">
      <path d="M 12 2 L 15 9 L 22 9 L 17 14 L 19 21 L 12 17 L 5 21 L 7 14 L 2 9 L 9 9 Z" stroke="#FF2E93" stroke-width="2" stroke-linejoin="round" fill="none" />
    </g>
    <text x="105" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="900" fill="url(#text-pink)" text-anchor="middle">ML Hub</text>
    <text x="105" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#FF2E93" letter-spacing="1.2" text-anchor="middle">DATA &amp; ML FOCUS</text>
    <text x="105" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">Jupyter Notebook models</text>
  </g>
</svg>
