<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 160" width="840" height="160" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#070A12" />
    </linearGradient>
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.2" />
    </linearGradient>
    <radialGradient id="glow-mid" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Card Background -->
  <rect width="840" height="160" fill="url(#bg)" rx="12" />
  <rect width="840" height="160" fill="url(#glow-mid)" rx="12" />

  <!-- Outer Border -->
  <rect x="0.5" y="0.5" width="839" height="159" rx="11.5" stroke="url(#border-glow)" stroke-width="1" />

  <!-- Dividers -->
  <line x1="210" y1="20" x2="210" y2="140" stroke="#1E293B" stroke-width="1.5" stroke-opacity="0.6" />
  <line x1="420" y1="20" x2="420" y2="140" stroke="#1E293B" stroke-width="1.5" stroke-opacity="0.6" />
  <line x1="630" y1="20" x2="630" y2="140" stroke="#1E293B" stroke-width="1.5" stroke-opacity="0.6" />

  <!-- Column 1: Projects Built -->
  <g transform="translate(0, 0)">
    <g transform="translate(93, 20)">
      <path d="M 12 2 L 2 7 L 12 12 L 22 7 Z" stroke="#38BDF8" stroke-width="1.8" fill="none" stroke-linejoin="round" />
      <path d="M 2 17 L 12 22 L 22 17" stroke="#38BDF8" stroke-width="1.8" fill="none" stroke-linecap="round" />
      <path d="M 2 12 L 12 17 L 22 12" stroke="#38BDF8" stroke-width="1.8" fill="none" stroke-linecap="round" />
    </g>
    <text x="105" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="800" fill="#F8FAFC" text-anchor="middle">15+</text>
    <text x="105" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1" text-anchor="middle">PROJECTS SHIPPED</text>
    <text x="105" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="400" fill="#64748B" text-anchor="middle">From Web to Machine Learning</text>
  </g>

  <!-- Column 2: Commits -->
  <g transform="translate(210, 0)">
    <g transform="translate(93, 20)">
      <circle cx="12" cy="12" r="4" stroke="#8B5CF6" stroke-width="1.8" fill="none" />
      <line x1="6" y1="12" x2="2" y2="12" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" />
      <line x1="22" y1="12" x2="18" y2="12" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" />
      <line x1="12" y1="6" x2="12" y2="2" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" />
      <line x1="12" y1="22" x2="12" y2="18" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" />
    </g>
    <text x="105" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="800" fill="#F8FAFC" text-anchor="middle">1,000+</text>
    <text x="105" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1" text-anchor="middle">TOTAL COMMITS</text>
    <text x="105" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="400" fill="#64748B" text-anchor="middle"> Relentless daily development</text>
  </g>

  <!-- Column 3: Open Source -->
  <g transform="translate(420, 0)">
    <g transform="translate(93, 20)">
      <circle cx="12" cy="12" r="9" stroke="#38BDF8" stroke-width="1.8" fill="none" />
      <path d="M 3.6 9 L 20.4 9" stroke="#38BDF8" stroke-width="1.8" />
      <path d="M 3.6 15 L 20.4 15" stroke="#38BDF8" stroke-width="1.8" />
      <path d="M 12 3 A 9 9 0 0 0 12 21" stroke="#38BDF8" stroke-width="1.8" fill="none" />
    </g>
    <text x="105" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="800" fill="#F8FAFC" text-anchor="middle">Active</text>
    <text x="105" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1" text-anchor="middle">OPEN SOURCE</text>
    <text x="105" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="400" fill="#64748B" text-anchor="middle">Contributing to global tools</text>
  </g>

  <!-- Column 4: Continuous Learning -->
  <g transform="translate(630, 0)">
    <g transform="translate(93, 20)">
      <path d="M 12 2 L 15 9 L 22 9 L 17 14 L 19 21 L 12 17 L 5 21 L 7 14 L 2 9 L 9 9 Z" stroke="#8B5CF6" stroke-width="1.8" stroke-linejoin="round" fill="none" />
    </g>
    <text x="105" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="800" fill="#F8FAFC" text-anchor="middle">100%</text>
    <text x="105" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1" text-anchor="middle">DEV DEDICATION</text>
    <text x="105" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="400" fill="#64748B" text-anchor="middle">Always learning, always building</text>
  </g>
</svg>
