<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 135 38" width="135" height="38" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0D1B" />
      <stop offset="100%" stop-color="#04060E" />
    </linearGradient>
  </defs>

  <!-- Button Background -->
  <rect width="135" height="38" fill="url(#bg)" rx="8" />
  <rect x="0.5" y="0.5" width="134" height="37" rx="7.5" stroke="#FF2E93" stroke-opacity="0.5" stroke-width="1.2" />

  <!-- Instagram Icon -->
  <g transform="translate(14, 9)">
    <rect x="1" y="1" width="18" height="18" rx="5" stroke="#FF2E93" stroke-width="2" fill="none" />
    <circle cx="10" cy="10" r="4.5" stroke="#FF2E93" stroke-width="2" fill="none" />
    <circle cx="15" cy="5" r="1.2" fill="#FF2E93" />
  </g>

  <!-- Button Label -->
  <text x="44" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="700" fill="#F8FAFC" letter-spacing="0.5">Instagram</text>
</svg>
