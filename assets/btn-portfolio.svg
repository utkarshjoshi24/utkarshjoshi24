      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#070A12" />
    </linearGradient>
  </defs>

  <!-- Button Background -->
  <rect width="135" height="38" fill="url(#bg)" rx="8" />
  <rect x="0.5" y="0.5" width="134" height="37" rx="7.5" stroke="#8B5CF6" stroke-opacity="0.4" stroke-width="1" />

  <!-- Portfolio (Globe) Icon -->
