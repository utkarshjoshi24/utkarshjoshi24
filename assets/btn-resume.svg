<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 135 38" width="135" height="38" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0D1B" />
      <stop offset="100%" stop-color="#04060E" />
    </linearGradient>
  </defs>

  <!-- Button Background -->
  <rect width="135" height="38" fill="url(#bg)" rx="8" />
  <rect x="0.5" y="0.5" width="134" height="37" rx="7.5" stroke="#8B5CF6" stroke-opacity="0.5" stroke-width="1.2" />

  <!-- Resume Icon -->
  <g transform="translate(14, 9)">
    <rect x="3" y="1" width="14" height="18" rx="2" stroke="#8B5CF6" stroke-width="2" fill="none" />
    <line x1="7" y1="6" x2="13" y2="6" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" />
    <line x1="7" y1="10" x2="13" y2="10" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" />
    <line x1="7" y1="14" x2="11" y2="14" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" />
  </g>

  <!-- Button Label -->
  <text x="44" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="700" fill="#F8FAFC" letter-spacing="0.5">Resume</text>
</svg>
