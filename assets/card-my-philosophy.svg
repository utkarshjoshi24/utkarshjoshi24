<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180" fill="none">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0D1B" />
      <stop offset="100%" stop-color="#04060E" />
    </linearGradient>
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="30%" stop-color="#4FACFE" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0.1" />
    </linearGradient>
    <radialGradient id="glow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Card Background -->
  <rect width="400" height="180" fill="url(#card-bg)" rx="12" />
  
  <!-- Glowing Overlay -->
  <rect width="400" height="180" fill="url(#glow)" rx="12" />

  <!-- Outer Border -->
  <rect x="0.5" y="0.5" width="399" height="179" rx="11.5" stroke="url(#border-glow)" stroke-width="1.2" />

  <!-- Title -->
  <text x="24" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" fill="#F8FAFC" letter-spacing="1">My Philosophy</text>

  <!-- Philosophy/Lightbulb Icon -->
  <g transform="translate(340, 24)">
    <path d="M 12 3 A 7 7 0 0 0 6 13.5 C 7.5 15.5 8.5 16.5 8.5 18 L 15.5 18 C 15.5 16.5 16.5 15.5 18 13.5 A 7 7 0 0 0 12 3 Z" stroke="#00F2FE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="9" y1="21" x2="15" y2="21" stroke="#00F2FE" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Body Text -->
  <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="400" fill="#94A3B8">
    <tspan x="24" y="74">Software is a form of design. I believe code should</tspan>
    <tspan x="24" y="96">not just run correctly, but be self-documenting and</tspan>
    <tspan x="24" y="118">beautiful. Relentless refinement and deep curiosity</tspan>
    <tspan x="24" y="140">are the foundations of true software engineering.</tspan>
  </text>
</svg>
