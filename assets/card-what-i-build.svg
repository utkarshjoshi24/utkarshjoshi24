<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180" fill="none">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#070A12" />
    </linearGradient>
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.4" />
      <stop offset="30%" stop-color="#1E293B" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0.1" />
    </linearGradient>
    <radialGradient id="glow" cx="0%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Card Background -->
  <rect width="400" height="180" fill="url(#card-bg)" rx="12" />
  
  <!-- Glowing Overlay -->
  <rect width="400" height="180" fill="url(#glow)" rx="12" />

  <!-- Outer Border with Gradient -->
  <rect x="0.5" y="0.5" width="399" height="179" rx="11.5" stroke="url(#border-glow)" stroke-width="1" />

  <!-- Title -->
  <text x="24" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" fill="#F8FAFC" letter-spacing="1">What I Build</text>

  <!-- Code Icon -->
  <g transform="translate(340, 24)">
    <path d="M 6 6 L 1 12 L 6 18" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 18 6 L 23 12 L 18 18" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 14 4 L 10 20" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Body Text -->
  <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="400" fill="#94A3B8">
    <tspan x="24" y="74">Scalable MERN web apps, 3D interactive UIs</tspan>
    <tspan x="24" y="96">with React Three Fiber, Google Gemini AI integrations,</tspan>
    <tspan x="24" y="118">and robust server APIs. I prioritize performance,</tspan>
    <tspan x="24" y="140">pixel-perfect design, and clean architecture.</tspan>
  </text>
</svg>
