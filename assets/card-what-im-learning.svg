<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180" fill="none">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0D1B" />
      <stop offset="100%" stop-color="#04060E" />
    </linearGradient>
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="30%" stop-color="#4FACFE" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0.1" />
    </linearGradient>
    <radialGradient id="glow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Card Background -->
  <rect width="400" height="180" fill="url(#card-bg)" rx="12" />
  
  <!-- Glowing Overlay -->
  <rect width="400" height="180" fill="url(#glow)" rx="12" />

  <!-- Outer Border -->
  <rect x="0.5" y="0.5" width="399" height="179" rx="11.5" stroke="url(#border-glow)" stroke-width="1.2" />

  <!-- Title -->
  <text x="24" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" fill="#F8FAFC" letter-spacing="1">What I'm Learning</text>

  <!-- Book Icon -->
  <g transform="translate(340, 24)">
    <path d="M 2 16 C 6 12 12 12 12 12 C 12 12 18 12 22 16" stroke="#00F2FE" stroke-width="2" fill="none" stroke-linecap="round" />
    <path d="M 2 6 C 6 2 12 2 12 2 C 12 2 18 2 22 6" stroke="#00F2FE" stroke-width="2" fill="none" stroke-linecap="round" />
    <line x1="2" y1="6" x2="2" y2="16" stroke="#00F2FE" stroke-width="2" stroke-linecap="round" />
    <line x1="12" y1="2" x2="12" y2="19" stroke="#00F2FE" stroke-width="2" />
    <line x1="22" y1="6" x2="22" y2="16" stroke="#00F2FE" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Body Text -->
  <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="400" fill="#94A3B8">
    <tspan x="24" y="74">Large language model fine-tuning, NLP pipelines,</tspan>
    <tspan x="24" y="96">and neural network architectures. Also deepening my</tspan>
    <tspan x="24" y="118">knowledge of GPU-accelerated web graphics via Three.js,</tspan>
    <tspan x="24" y="140">and containerizing workflows for cloud deployment.</tspan>
  </text>
</svg>
