<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 180" width="840" height="180" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#070A12" />
    </linearGradient>
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#1E293B" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.2" />
    </linearGradient>
    <radialGradient id="glow-left" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-right" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Card Background -->
  <rect width="840" height="180" fill="url(#bg)" rx="12" />
  
  <!-- Glowing Overlay -->
  <rect width="840" height="180" fill="url(#glow-left)" rx="12" />
  <rect width="840" height="180" fill="url(#glow-right)" rx="12" />

  <!-- Outer Border -->
  <rect x="0.5" y="0.5" width="839" height="179" rx="11.5" stroke="url(#border-glow)" stroke-width="1" />

  <!-- Divider Lines (Vertical) -->
  <line x1="168" y1="20" x2="168" y2="160" stroke="#1E293B" stroke-width="1.5" stroke-opacity="0.6" />
  <line x1="336" y1="20" x2="336" y2="160" stroke="#1E293B" stroke-width="1.5" stroke-opacity="0.6" />
  <line x1="504" y1="20" x2="504" y2="160" stroke="#1E293B" stroke-width="1.5" stroke-opacity="0.6" />
  <line x1="672" y1="20" x2="672" y2="160" stroke="#1E293B" stroke-width="1.5" stroke-opacity="0.6" />

  <!-- ================= COLUMN 1: BUILDING ================= -->
  <g transform="translate(0, 0)">
    <!-- Icon (Hammer/Wrench) -->
    <g transform="translate(72, 30)">
      <path d="M 6 18 L 18 6" stroke="#38BDF8" stroke-width="1.8" stroke-linecap="round" />
      <path d="M 15 3 C 16.5 4.5 19 6.5 21 8.5 L 18 11.5 L 12.5 6 Z" stroke="#38BDF8" stroke-width="1.8" stroke-linejoin="round" fill="none" />
      <circle cx="5" cy="19" r="2" fill="#38BDF8" />
    </g>
    <text x="84" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1.5" text-anchor="middle">BUILDING</text>
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500" fill="#F8FAFC" text-anchor="middle">
      <tspan x="84" y="112">Healio AI Portal</tspan>
      <tspan x="84" y="132" fill="#94A3B8" font-size="11">MERN Stack + 3D</tspan>
    </text>
  </g>

  <!-- ================= COLUMN 2: LEARNING ================= -->
  <g transform="translate(168, 0)">
    <!-- Icon (Graduation Cap / Brain) -->
    <g transform="translate(72, 30)">
      <path d="M 12 3 L 22 8 L 12 13 L 2 8 Z" stroke="#8B5CF6" stroke-width="1.8" fill="none" stroke-linejoin="round" />
      <path d="M 6 10 L 6 17 C 6 19 12 21 12 21 C 12 21 18 19 18 17 L 18 10" stroke="#8B5CF6" stroke-width="1.8" fill="none" stroke-linejoin="round" />
      <line x1="22" y1="8" x2="22" y2="15" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" />
    </g>
    <text x="84" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1.5" text-anchor="middle">LEARNING</text>
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500" fill="#F8FAFC" text-anchor="middle">
      <tspan x="84" y="112">LLM Architectures</tspan>
      <tspan x="84" y="132" fill="#94A3B8" font-size="11">NLP &amp; Fine-tuning</tspan>
    </text>
  </g>

  <!-- ================= COLUMN 3: READING ================= -->
  <g transform="translate(336, 0)">
    <!-- Icon (Book) -->
    <g transform="translate(72, 30)">
      <path d="M 4 19 C 8 16 12 16 12 16 C 12 16 16 16 20 19 L 20 5 C 16 2 12 2 12 2 C 12 2 8 2 4 5 Z" stroke="#38BDF8" stroke-width="1.8" fill="none" stroke-linejoin="round" />
      <line x1="12" y1="2" x2="12" y2="17" stroke="#38BDF8" stroke-width="1.8" />
    </g>
    <text x="84" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1.5" text-anchor="middle">READING</text>
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500" fill="#F8FAFC" text-anchor="middle">
      <tspan x="84" y="112">Designing Data</tspan>
      <tspan x="84" y="132" fill="#94A3B8" font-size="11">Intensive Systems</tspan>
    </text>
  </g>

  <!-- ================= COLUMN 4: EXPLORING ================= -->
  <g transform="translate(504, 0)">
    <!-- Icon (Compass/Telescope) -->
    <g transform="translate(72, 30)">
      <circle cx="12" cy="12" r="9" stroke="#8B5CF6" stroke-width="1.8" fill="none" />
      <path d="M 16.5 7.5 L 14 14 L 7.5 16.5 L 10 10 Z" stroke="#8B5CF6" stroke-width="1.8" fill="none" stroke-linejoin="round" />
    </g>
    <text x="84" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1.5" text-anchor="middle">EXPLORING</text>
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500" fill="#F8FAFC" text-anchor="middle">
      <tspan x="84" y="112">Agentic Workflows</tspan>
      <tspan x="84" y="132" fill="#94A3B8" font-size="11">LangGraph &amp; CrewAI</tspan>
    </text>
  </g>

  <!-- ================= COLUMN 5: 2026 GOALS ================= -->
  <g transform="translate(672, 0)">
    <!-- Icon (Target/Trophy) -->
    <g transform="translate(72, 30)">
      <path d="M 6 4 C 6 2 18 2 18 4 L 18 10 C 18 14 15 17 12 17 C 9 17 6 14 6 10 Z" stroke="#38BDF8" stroke-width="1.8" fill="none" stroke-linejoin="round" />
      <path d="M 6 7 L 2 7 C 1.5 7 1 8 1 9.5 C 1 11 2 12.5 4 12.5 L 6 12.5" stroke="#38BDF8" stroke-width="1.8" stroke-linecap="round" />
      <path d="M 18 7 L 22 7 C 22.5 7 23 8 23 9.5 C 23 11 22 12.5 20 12.5 L 18 12.5" stroke="#38BDF8" stroke-width="1.8" stroke-linecap="round" />
      <line x1="12" y1="17" x2="12" y2="20" stroke="#38BDF8" stroke-width="1.8" />
      <line x1="8" y1="21" x2="16" y2="21" stroke="#38BDF8" stroke-width="1.8" stroke-linecap="round" />
    </g>
    <text x="84" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1.5" text-anchor="middle">2026 GOALS</text>
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500" fill="#F8FAFC" text-anchor="middle">
      <tspan x="84" y="112">Open Source</tspan>
      <tspan x="84" y="132" fill="#94A3B8" font-size="11">Core Contributions</tspan>
    </text>
  </g>
</svg>
