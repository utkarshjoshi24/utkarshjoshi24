<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 10" width="840" height="10" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0" />
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="1" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <!-- Base Line -->
  <line x1="0" y1="5" x2="840" y2="5" stroke="#1E293B" stroke-width="1.5" stroke-opacity="0.6" />

  <!-- Sweeping Glow Line -->
  <line x1="-150" y1="5" x2="0" y2="5" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round">
    <animate attributeName="x1" values="-150;840" dur="5s" repeatCount="indefinite" />
    <animate attributeName="x2" values="0;990" dur="5s" repeatCount="indefinite" />
  </line>
</svg>
