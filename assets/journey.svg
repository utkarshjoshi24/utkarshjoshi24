<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 520" width="840" height="520" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#070A12" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.2" />
    </linearGradient>

    <!-- Central Track Gradient -->
    <linearGradient id="track-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>

    <radialGradient id="node-glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
    </radialGradient>
    
    <radialGradient id="node-glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Card Background & Border -->
  <rect width="840" height="520" fill="url(#bg)" rx="12" />
  <rect x="0.5" y="0.5" width="839" height="519" rx="11.5" stroke="url(#border-glow)" stroke-width="1" />

  <!-- Title -->
  <text x="420" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" fill="#94A3B8" letter-spacing="3" text-anchor="middle">DEVELOPER JOURNEY</text>

  <!-- Central Track Line -->
  <line x1="420" y1="55" x2="420" y2="475" stroke="url(#track-grad)" stroke-width="2" stroke-opacity="0.4" />
  <line x1="420" y1="55" x2="420" y2="475" stroke="url(#track-grad)" stroke-width="6" stroke-opacity="0.1" />

  <!-- Animated Traveling Orb on Track -->
  <circle cx="420" cy="55" r="4" fill="#38BDF8">
    <animate attributeName="cy" values="55;475;55" dur="12s" repeatCount="indefinite" />
    <animate attributeName="fill" values="#38BDF8;#8B5CF6;#38BDF8" dur="12s" repeatCount="indefinite" />
  </circle>

  <!-- ================= TIMELINE NODES & DETAILS ================= -->

  <!-- NODE 1: 2020 (Left) -->
  <g>
    <!-- Connector Glow & Circle -->
    <circle cx="420" cy="70" r="12" fill="url(#node-glow-blue)" />
    <circle cx="420" cy="70" r="4" fill="#38BDF8" />
    <!-- Text Panel -->
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" text-anchor="end">
      <tspan x="390" y="68" font-size="13" font-weight="700" fill="#F8FAFC">Started Programming</tspan>
      <tspan x="390" y="84" font-size="11" font-weight="400" fill="#94A3B8">Discovered computing logic, algorithm flows, and python fundamentals.</tspan>
    </text>
    <text x="440" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="800" fill="#38BDF8" stroke="#38BDF8" stroke-width="0.3" text-anchor="start">2020</text>
  </g>

  <!-- NODE 2: 2021 (Right) -->
  <g>
    <circle cx="420" cy="135" r="12" fill="url(#node-glow-purple)" />
    <circle cx="420" cy="135" r="4" fill="#8B5CF6" />
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" text-anchor="start">
      <tspan x="450" y="133" font-size="13" font-weight="700" fill="#F8FAFC">Web Development</tspan>
      <tspan x="450" y="149" font-size="11" font-weight="400" fill="#94A3B8">Built responsive user interfaces and backend database services (MERN).</tspan>
    </text>
    <text x="370" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="800" fill="#8B5CF6" stroke="#8B5CF6" stroke-width="0.3" text-anchor="end">2021</text>
  </g>

  <!-- NODE 3: 2022 (Left) -->
  <g>
    <circle cx="420" cy="200" r="12" fill="url(#node-glow-blue)" />
    <circle cx="420" cy="200" r="4" fill="#38BDF8" />
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" text-anchor="end">
      <tspan x="390" y="198" font-size="13" font-weight="700" fill="#F8FAFC">Machine Learning</tspan>
      <tspan x="390" y="214" font-size="11" font-weight="400" fill="#94A3B8">Explored supervised algorithms, neural weights, and dataset cleanups.</tspan>
    </text>
    <text x="440" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="800" fill="#38BDF8" stroke="#38BDF8" stroke-width="0.3" text-anchor="start">2022</text>
  </g>

  <!-- NODE 4: 2023 (Right) -->
  <g>
    <circle cx="420" cy="265" r="12" fill="url(#node-glow-purple)" />
    <circle cx="420" cy="265" r="4" fill="#8B5CF6" />
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" text-anchor="start">
      <tspan x="450" y="263" font-size="13" font-weight="700" fill="#F8FAFC">Data Science</tspan>
      <tspan x="450" y="279" font-size="11" font-weight="400" fill="#94A3B8">Engineered pipeline architectures, statistical validations, and EDA logs.</tspan>
    </text>
    <text x="370" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="800" fill="#8B5CF6" stroke="#8B5CF6" stroke-width="0.3" text-anchor="end">2023</text>
  </g>

  <!-- NODE 5: 2024 (Left) -->
  <g>
    <circle cx="420" cy="330" r="12" fill="url(#node-glow-blue)" />
    <circle cx="420" cy="330" r="4" fill="#38BDF8" />
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" text-anchor="end">
      <tspan x="390" y="328" font-size="13" font-weight="700" fill="#F8FAFC">Artificial Intelligence</tspan>
      <tspan x="390" y="344" font-size="11" font-weight="400" fill="#94A3B8">Integrated CNNs, sequence modeling, and neural pattern structures.</tspan>
    </text>
    <text x="440" y="335" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="800" fill="#38BDF8" stroke="#38BDF8" stroke-width="0.3" text-anchor="start">2024</text>
  </g>

  <!-- NODE 6: 2025 (Right) -->
  <g>
    <circle cx="420" cy="395" r="12" fill="url(#node-glow-purple)" />
    <circle cx="420" cy="395" r="4" fill="#8B5CF6" />
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" text-anchor="start">
      <tspan x="450" y="393" font-size="13" font-weight="700" fill="#F8FAFC">Large Language Models</tspan>
      <tspan x="450" y="409" font-size="11" font-weight="400" fill="#94A3B8">Deployed fine-tuned weights, RAG patterns, and multi-agent meshes.</tspan>
    </text>
    <text x="370" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="800" fill="#8B5CF6" stroke="#8B5CF6" stroke-width="0.3" text-anchor="end">2025</text>
  </g>

  <!-- NODE 7: 2026 (Left) -->
  <g>
    <circle cx="420" cy="460" r="12" fill="url(#node-glow-blue)" />
    <circle cx="420" cy="460" r="4" fill="#38BDF8" />
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" text-anchor="end">
      <tspan x="390" y="458" font-size="13" font-weight="700" fill="#F8FAFC">Building Real Products</tspan>
      <tspan x="390" y="474" font-size="11" font-weight="400" fill="#94A3B8">Shipped high-end AI healthcare platform Healio for clinical triage workflows.</tspan>
    </text>
    <text x="440" y="465" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="800" fill="#38BDF8" stroke="#38BDF8" stroke-width="0.3" text-anchor="start">2026</text>
  </g>
</svg>
